<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة العربية - النموذج الأول</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #a8dadc, #457b9d); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); width: 90%; max-width: 500px; text-align: center; }
        h1, h2 { color: #1d3557; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn { background: linear-gradient(90deg, #457b9d, #1d3557); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(29, 53, 87, 0.3); }
        .option-label { background: #f8f9fa; padding: 14px; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; display: block; font-size: 18px; margin-bottom: 10px; text-align: right; }
    </style>
</head>
<body>
    <div class="container" id="quizContainer">
        <h1>اختبار اللغة العربية (1)</h1>
        <p>يرجى إدخال البيانات لبدء الاختبار</p>
        <div class="form-group"><label>اسم الطالب ثلاثي:</label><input type="text" id="studentNameInput" placeholder="اكتب اسمك هنا"></div>
        <div class="form-group"><label>رقم الجلوس:</label><input type="number" id="seatingInput" placeholder="اكتب رقم جلوسك هنا"></div>
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
    </div>
    <script>
        const quizQuestions = [
            { question: "1. ما هو جمع كلمة (قلم)؟", options: ["قلمات", "أقلام", "قلمون", "أقلمة"], correct: 1 },
            { question: "2. الفعل (كَتَبَ) هو فعل:", options: ["ماضٍ", "مضارع", "أمر", "مستقبل"], correct: 0 },
            { question: "3. الكلمة التي تحتوي على لام شمسية هي:", options: ["المدرسة", "الكتاب", "الشمس", "القلم"], correct: 2 },
            { question: "4. علامة رفع المبتدأ والخبر المفرد هي:", options: ["الفتحة", "الضمة", "الكسرة", "السكون"], correct: 1 }
        ];
        let currentQuestionIndex = 0; let studentScore = 0; let studentName = ""; let seatingNumber = "";
        function startQuiz() {
            studentName = document.getElementById("studentNameInput").value.trim();
            seatingNumber = document.getElementById("seatingInput").value.trim();
            if (studentName === "" || seatingNumber === "") { alert("يرجى إدخال الاسم ورقم الجلوس أولاً!"); return; }
            showQuestion();
        }
        function showQuestion() {
            const currentQuestion = quizQuestions[currentQuestionIndex]; const container = document.getElementById("quizContainer");
            let optionsHTML = "";
            currentQuestion.options.forEach((option, index) => {
                optionsHTML += `<label class="option-label"><input type="radio" name="quizOption" value="${index}" style="margin-left: 12px; transform: scale(1.2);"> ${option}</label>`;
            });
            const btnText = (currentQuestionIndex === quizQuestions.length - 1) ? "إنهاء الاختبار وإرسال النتيجة" : "التالي";
            container.innerHTML = `<div style="text-align: right; direction: rtl;"><h2>${currentQuestion.question}</h2><div id="optionsContainer">${optionsHTML}</div><button class="btn" style="margin-top: 15px;" onclick="handleNextClick()">${btnText}</button></div>`;
        }
        function handleNextClick() {
            const selectedOption = document.querySelector('input[name="quizOption"]:checked');
            if (!selectedOption) { alert("يرجى اختيار إجابة واحدة!"); return; }
            if (parseInt(selectedOption.value) === quizQuestions[currentQuestionIndex].correct) { studentScore++; }
            if (currentQuestionIndex < quizQuestions.length - 1) { currentQuestionIndex++; showQuestion(); } else { sendFinalDataToSheets(); }
        }
        function sendFinalDataToSheets() {
            const webAppUrl = "https://script.google.com/macros/s/AKfycbwbeK0A-zttXau--Deg5up5od8T91Bz0YCPTaiNQz8RQ-RbgTjcQ0Tv0TabIRngLJC2/exec"; 
            const finalScoreText = studentScore + " / " + quizQuestions.length; const percentage = (studentScore / quizQuestions.length) * 100;
            const container = document.getElementById("quizContainer");
            container.innerHTML = `<div style="text-align: center; direction: rtl; padding: 20px;"><h1 style="color: #1d3557; font-size: 26px;">تم الانتهاء من اختبار اللغة العربية</h1><div style="font-size: 64px; font-weight: bold; color: #457b9d; margin: 20px 0;">%${percentage}</div><div style="color: #2a9d8f; font-size: 18px; font-weight: bold; margin-bottom: 15px;">تم تسجيل إجاباتك وإرسال الدرجة تلقائياً.</div><div style="font-size: 20px; color: #555555; margin-bottom: 10px;">أحسنت يا ${studentName}!</div><div style="font-size: 16px; color: #777;">لقد حصلت على درجة: ${finalScoreText}</div></div>`;
            const requestBody = "studentName=" + encodeURIComponent(studentName) + "&seatingNumber=" + encodeURIComponent(seatingNumber) + "&score=" + encodeURIComponent(finalScoreText) + "&subject=" + encodeURIComponent("اللغة العربية");
            fetch(webAppUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: requestBody }).catch(err => console.error(err));
        }
    </script>
</body>
</html>
