 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة العربية (1)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; text-align: center; padding: 20px; direction: rtl; }
        .quiz-container { background: white; max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { color: #1d3557; font-size: 24px; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        .input-group input { width: 95%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .btn { background-color: #1d3557; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn:hover { background-color: #457b9d; }
        .option-label { display: block; text-align: right; background: #f8f9fa; padding: 12px; margin: 10px 0; border: 1px solid #e9ecef; border-radius: 6px; cursor: pointer; }
        .option-label:hover { background: #e2eafc; }
    </style>
</head>
<body>

<div class="quiz-container" id="quizContainer">
    <h1>اختبار اللغة العربية (1)</h1>
    <p style="color: #666; margin-bottom: 30px;">يرجى إدخال البيانات لبدء الاختبار</p>
    
    <div class="input-group">
        <label for="studentName">اسم الطالب ثلاثي:</label>
        <input type="text" id="studentName" placeholder="اكتب اسمك هنا">
    </div>
    
    <div class="input-group">
        <label for="seatingNumber">رقم الجلوس:</label>
        <input type="text" id="seatingNumber" placeholder="اكتب رقم جلوسك هنا">
    </div>
    
    <button class="btn" onclick="startQuiz()">ابدأ الاختبار الآن</button>
</div>

<script>
// قائمة أسئلة الاختبار الأول (يمكنك تعديل النصوص والخيارات والإجابة الصحيحة هنا)
const quizQuestions = [
    {
        question: "السؤال الأول: ما علامة رفع جمع المذكر السالم؟",
        options: ["الضمة", "الواو", "الألف", "الفتحة"],
        correct: 1 // الترتيب يبدأ من 0 (الواو هي الخيار رقم 1)
    },
    {
        question: "السؤال الثاني: مفرد كلمة 'علماء' هو:",
        options: ["عالم", "معلم", "علم", "علامة"],
        correct: 0 // عالم هو الخيار رقم 0
    }
];

let currentQuestionIndex = 0;
let studentScore = 0;
let savedName = "";
let savedSeat = "";

function startQuiz() {
    savedName = document.getElementById("studentName").value.trim();
    savedSeat = document.getElementById("seatingNumber").value.trim();
    
    if (!savedName || !savedSeat) {
        alert("يرجى إدخال الاسم ورقم الجلوس أولاً!");
        return;
    }
    showQuestion();
}

function showQuestion() {
    const currentQuestion = quizQuestions[currentQuestionIndex];
    let optionsHTML = "";
    
    currentQuestion.options.forEach((option, index) => {
        optionsHTML += `<label class="option-label">
            <input type="radio" name="quizOption" value="${index}" style="margin-left: 10px;"> ${option}
        </label>`;
    });
    
    const container = document.getElementById("quizContainer");
    container.innerHTML = `
        <h2 style="font-size: 20px; text-align: right; color: #1d3557;">${currentQuestion.question}</h2>
        <div style="margin: 20px 0;">${optionsHTML}</div>
        <button class="btn" onclick="handleNextClick()">التالي</button>
    `;
}

function handleNextClick() {
    const selectedOption = document.querySelector('input[name="quizOption"]:checked');
    if (!selectedOption) {
        alert("يرجى اختيار إجابة واحدة!");
        return;
    }
    
    if (parseInt(selectedOption.value) === quizQuestions[currentQuestionIndex].correct) {
        studentScore++;
    }
    
    if (currentQuestionIndex < quizQuestions.length - 1) {
        currentQuestionIndex++;
        showQuestion();
    } else {
        sendFinalDataToSheets();
    }
}

function sendFinalDataToSheets() {
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyY-bXA6RFCOxY3HgN76NzKi6TYcvcajhIJ3Pe7Y48LF8_dcRTpbynOzkpphaEMJj14/exec";
    const finalScoreText = studentScore + " / " + quizQuestions.length;
    const percentage = (studentScore / quizQuestions.length) * 100;
    
    const container = document.getElementById("quizContainer");
    container.innerHTML = `
        <div style="text-align: center; padding: 20px;">
            <h1 style="color: #1d3557; font-size: 26px;">تم الانتهاء من اختبار اللغة العربية</h1>
            <h2 style="font-size: 50px; color: #457b9d; margin: 20px 0;">%${percentage}</h2>
            <p style="font-size: 18px; color: #1d3557;">تم تسجيل إجابتك وإرسال الدرجة تلقائيًا.</p>
            <p style="font-size: 20px; font-weight: bold; margin-top: 10px;">أحسنت يا ${savedName}!</p>
            <p style="font-size: 16px; color: #6c757d;">لقد حصلت على درجة: ${finalScoreText}</p>
        </div>
    `;

    // إرسال البيانات الفعلية والمحدثة لكود جوجل شيت
    const requestBody = `studentName=${encodeURIComponent(savedName)}&seatingNumber=${encodeURIComponent(savedSeat)}&score=${encodeURIComponent(finalScoreText)}&subject=${encodeURIComponent("اللغة العربية - اختبار 1")}`;
    
    fetch(webAppUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: requestBody
    });
}
</script>

</body>
</html>
